<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGIM ATTENDENCE APP TESTING</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1B5E20">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f0f0;
        }

        h1 {
            color: #4CAF50;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }

        /* Professional gradient splash screen */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4CAF50, #1B5E20);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            z-index: 1000;
            flex-direction: column;
        }

        /* Text animation */
        #splash-text {
            opacity: 0;
            transform: scale(0.8);
            animation: fadeInScale 1.5s forwards;
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="splash">
        <div id="splash-text">DIGIM ATTENDENCE APP TESTING</div>
    </div>

    <h1>Teacher Attendance</h1>
    <p>Mark your attendance (Location Required)</p>

    <button id="markBtn" onclick="markAttendance()">Mark Attendance</button>
    <button id="logoutBtn" onclick="logout()" style="display:none; margin-top:10px;">Logout</button>
    <p id="status"></p>

    <script>
        // Hide splash after 2 seconds
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
            }, 2000);
        });

        // School coordinates
        const schoolLat = 17 + 41 / 60 + 39.8 / 3600; // 17.694389
        const schoolLon = 83 + 10 / 60 + 17.1 / 3600; // 83.171417
        const allowedDistance = 0.2; // km

        // Calculate distance between two coordinates
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Mark attendance
        function markAttendance() {
            if (!navigator.geolocation) { alert("Geolocation not supported"); return; }

            navigator.geolocation.getCurrentPosition(position => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;
                const distance = getDistance(userLat, userLon, schoolLat, schoolLon);

                if (distance > allowedDistance) {
                    alert("You are outside the school location ❌");
                    return;
                }

                const today = new Date().toLocaleDateString();
                const markedDate = localStorage.getItem("attendanceDate");

                if (markedDate === today) {
                    alert("Attendance already marked today ❌");
                    showStatus();
                    return;
                }

                const now = new Date().toLocaleTimeString();
                localStorage.setItem("attendanceDate", today);
                localStorage.setItem("attendanceTime", now);

                alert("Attendance marked at " + now + " ✅");
                showStatus();
            });
        }

        // Logout function
        function logout() {
            localStorage.removeItem("attendanceDate");
            localStorage.removeItem("attendanceTime");

            document.getElementById("markBtn").style.display = "inline-block";
            document.getElementById("logoutBtn").style.display = "none";
            document.getElementById("status").innerText = "Attendance not marked yet.";
        }

        // Show attendance status
        function showStatus() {
            const today = new Date().toLocaleDateString();
            const markedDate = localStorage.getItem("attendanceDate");
            const time = localStorage.getItem("attendanceTime");

            if (markedDate === today) {
                document.getElementById("status").innerText =
                    "✅ Attendance already marked today at " + time;
                document.getElementById("markBtn").style.display = "none";
                document.getElementById("logoutBtn").style.display = "inline-block";
            } else {
                document.getElementById("status").innerText = "Attendance not marked yet.";
                document.getElementById("markBtn").style.display = "inline-block";
                document.getElementById("logoutBtn").style.display = "none";
            }
        }

        showStatus();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('SW registration failed', err));
        }
    </script>

</body>

</html>
